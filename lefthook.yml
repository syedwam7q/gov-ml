pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,json,md,yml,yaml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs}"
      exclude: ["packages/shared-ts/src/index.ts"]
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    ruff:
      glob: "*.py"
      run: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}'
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm turbo typecheck
    test:
      run: pnpm turbo test
    # Pre-push pytest excludes ml-pipelines/toxicity — that smoke test downloads
    # a tiny HF model on first run and adds ~10 s to every push. CI runs the
    # full suite (with the [nlp] extras installed) so toxicity is still gated.
    pytest:
      run: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run pytest --ignore=ml-pipelines/toxicity'
